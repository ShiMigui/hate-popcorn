services:
  db:
    build: ./docker/db
    container_name: hatepopcorn_db
    volumes:
      - db_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: hatepopcorn_adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db

  api:
    build: ./docker/api
    container_name: hatepopcorn_api
    volumes:
      - ./api:/var/www/html
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: hatepopcorn_nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./api/public:/var/www/html/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  db_data:
